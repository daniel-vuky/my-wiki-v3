<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<aside style="width:260px;flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 12px;height:100%;box-sizing:border-box;overflow:hidden;">
  <div style="display:flex;align-items:center;gap:10px;padding:6px 8px 14px;">
    <div style="width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#1c1408;font:700 16px/1 'Newsreader',serif;flex:none;">F</div>
    <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;">
      <span style="font:700 15px/1 'Schibsted Grotesk',sans-serif;color:var(--text);">Folio</span>
      <span style="font:500 11px/1 'Schibsted Grotesk',sans-serif;color:var(--text-3);">Alex's workspace</span>
    </div>
    <span style="color:var(--text-3);display:flex;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg></span>
  </div>

  <button style="display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;background:var(--bg);border:1px solid var(--border);color:var(--text-3);font:500 13px/1 'Schibsted Grotesk',sans-serif;cursor:pointer;margin-bottom:8px;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.4-3.4"></path></svg>
    <span style="flex:1;text-align:left;">Search</span>
    <span style="font:500 10.5px/1 'JetBrains Mono',monospace;padding:2px 5px;border-radius:4px;background:var(--surface-2);color:var(--text-3);">⌘K</span>
  </button>

  <button style="display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 10px;border-radius:9px;background:var(--accent);border:none;color:#1c1408;font:600 13px/1 'Schibsted Grotesk',sans-serif;cursor:pointer;margin-bottom:18px;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"></path></svg>New note
  </button>

  <div style="font:600 10.5px/1 'Schibsted Grotesk',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);padding:4px 10px 6px;">Favorites</div>
  <sc-for list="{{ favorites }}" as="f" hint-placeholder-count="3">
    <a style="{{ f.style }}">
      <span style="color:var(--accent-text);display:flex;flex:none;"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5 20.4l1.4-6.8L1.3 9l6.9-.7z"></path></svg></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ f.name }}</span>
    </a>
  </sc-for>

  <div style="font:600 10.5px/1 'Schibsted Grotesk',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);padding:16px 10px 6px;display:flex;align-items:center;">
    Folders<span style="margin-left:auto;color:var(--text-3);display:flex;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"></path></svg></span>
  </div>
  <sc-for list="{{ folders }}" as="fd" hint-placeholder-count="6">
    <a style="{{ fd.style }}">
      <span style="width:9px;height:9px;border-radius:50%;flex:none;background:{{ fd.color }};"></span>
      <span style="flex:1;">{{ fd.name }}</span>
      <span style="font:500 11.5px/1 'JetBrains Mono',monospace;color:var(--text-3);">{{ fd.count }}</span>
    </a>
  </sc-for>

  <div style="font:600 10.5px/1 'Schibsted Grotesk',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);padding:16px 10px 8px;">Tags</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 8px;">
    <sc-for list="{{ tags }}" as="t" hint-placeholder-count="6">
      <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;background:var(--surface-2);color:var(--text-2);font:500 11.5px/1 'JetBrains Mono',monospace;">#{{ t }}</span>
    </sc-for>
  </div>

  <div style="margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px 4px;border-top:1px solid var(--border);">
    <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e0a548,#d98a8a);display:flex;align-items:center;justify-content:center;color:#fff;font:700 13px/1 'Schibsted Grotesk',sans-serif;flex:none;">AM</div>
    <div style="display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;">
      <span style="font:600 13px/1.2 'Schibsted Grotesk',sans-serif;color:var(--text);">Alex Mercer</span>
      <span style="font:500 11px/1 'Schibsted Grotesk',sans-serif;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;">alex@gmail.com</span>
    </div>
    <span style="color:var(--text-3);display:flex;cursor:pointer;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h8M16 6h4M4 12h2M10 12h10M4 18h12M20 18h0"></path><circle cx="14" cy="6" r="2"></circle><circle cx="8" cy="12" r="2"></circle><circle cx="18" cy="18" r="2"></circle></svg></span>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;engineering&quot;,&quot;reading&quot;,&quot;ideas&quot;,&quot;recipes&quot;,&quot;health&quot;,&quot;travel&quot;,&quot;search&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'home';
    const navBase = "display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;text-decoration:none;font:500 13.5px/1.15 'Schibsted Grotesk',sans-serif;cursor:pointer;";
    const on = "color:var(--accent-text);background:var(--accent-soft);";
    const off = "color:var(--text-2);background:transparent;";
    const folders = [
      { key: 'engineering', name: 'Engineering', count: 24, color: '#e0a548' },
      { key: 'reading', name: 'Reading', count: 18, color: '#4fb3a3' },
      { key: 'ideas', name: 'Ideas', count: 12, color: '#a89adf' },
      { key: 'recipes', name: 'Recipes', count: 9, color: '#d98a8a' },
      { key: 'health', name: 'Health', count: 6, color: '#7cba6a' },
      { key: 'travel', name: 'Travel', count: 7, color: '#6fa8dc' },
    ].map(f => ({ ...f, style: navBase + (f.key === active ? on : off) }));
    const favorites = ['Distributed Systems', '2026 Reading List', 'Home Server Setup']
      .map(n => ({ name: n, style: navBase + off }));
    const tags = ['systems', 'design', 'philosophy', 'python', 'books', 'productivity'];
    return { folders, favorites, tags };
  }
}
</script>
</body>
</html>
